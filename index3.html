<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aortic Valve PPM Calculator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background:white;
  color:#111;
  margin:30px;
}

h1 {
  margin-bottom:5px;
}

.subtitle {
  font-size:12px;
  margin-bottom:20px;
}

.section {
  margin-bottom:20px;
}

input {
  padding:6px;
  margin-right:10px;
  margin-bottom:10px;
}

button {
  padding:8px 12px;
  margin-right:10px;
  cursor:pointer;
}

.kpi {
  margin-top:10px;
  font-size:13px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:20px;
  margin-top:20px;
}

.card {
  border:1px solid #ccc;
  padding:10px;
}

.card h3 {
  margin-top:0;
  font-size:14px;
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th, td {
  border:1px solid #ddd;
  padding:4px;
  text-align:center;
}

.sev { background:#f8d7da; }
.mod { background:#fff3cd; }
.ok { background:#d4edda; }

@media print {
  button, input {
    display:none;
  }
  body {
    margin:10mm;
  }
}
</style>
</head>

<body>

<h1>Aortic Valve PPM Calculator</h1>
<div class="subtitle">
Indexed EOA = EOA / BSA (Mosteller). Severe ≤ 0.65 ; Moderate 0.65–0.85 (cm²/m²).
</div>

<div class="section">
  Weight (kg):
  <input id="weight" type="number" value="80">
  Height (cm):
  <input id="height" type="number" value="180">
  Surgeon surname:
  <input id="surname" type="text">
  Workplace:
  <input id="workplace" type="text">
  <br>
  <button onclick="compute()">OK (log)</button>
  <button onclick="generatePDF()">Generate PDF</button>
  <div class="kpi">BSA: <strong id="bsa">—</strong> m²</div>
</div>

<div class="grid" id="cards"></div>

<script>
const DATA = {"Perimount Magna Ease": [{"label": 19, "outside": 24, "eoa": 1.23, "inside": 18, "goa": 2.5446900494077322}, {"label": 21, "outside": 26, "eoa": 1.51, "inside": 20, "goa": 3.141592653589793}, {"label": 23, "outside": 28, "eoa": 1.73, "inside": 22, "goa": 3.80132711084365}, {"label": 25, "outside": 30, "eoa": 1.81, "inside": 24, "goa": 4.523893421169302}, {"label": 27, "outside": 32, "eoa": 2, "inside": 26, "goa": 5.3092915845667505}, {"label": 29, "outside": 34, "eoa": 2.1, "inside": 28, "goa": 6.157521601035994}], "Inspiris Resilia": [{"label": 19, "outside": 25, "eoa": 1.1, "inside": null, "goa": null}, {"label": 21, "outside": 27, "eoa": 1.43, "inside": null, "goa": null}, {"label": 23, "outside": 29, "eoa": 1.69, "inside": null, "goa": null}, {"label": 25, "outside": 32, "eoa": 1.95, "inside": null, "goa": null}, {"label": 27, "outside": 34, "eoa": 2.26, "inside": null, "goa": null}, {"label": 29, "outside": 36, "eoa": 2.48, "inside": null, "goa": null}], "Avalus Ultra": [{"label": 19, "outside": 26, "eoa": 1.4, "inside": null, "goa": null}, {"label": 21, "outside": 28, "eoa": 1.57, "inside": null, "goa": null}, {"label": 23, "outside": 30, "eoa": 1.96, "inside": null, "goa": null}, {"label": 25, "outside": 32, "eoa": 2.11, "inside": null, "goa": null}, {"label": 27, "outside": 35, "eoa": 2.49, "inside": null, "goa": null}, {"label": 29, "outside": 37, "eoa": 3, "inside": null, "goa": null}], "Epic Plus Supra": [{"label": 19, "outside": 25, "eoa": 1.1, "inside": null, "goa": null}, {"label": 21, "outside": 28, "eoa": 1.37, "inside": null, "goa": null}, {"label": 23, "outside": 29, "eoa": 1.49, "inside": null, "goa": null}, {"label": 25, "outside": 31, "eoa": 1.69, "inside": null, "goa": null}, {"label": 27, "outside": 33, "eoa": null, "inside": null, "goa": null}, {"label": 29, "outside": 36, "eoa": null, "inside": null, "goa": null}]};
const LOG_ENDPOINT = "https://script.google.com/macros/s/AKfycbzYBZirk5_uRXYmYCBj0nMUGPP4X7_LA2Op6iYvxIfHSK3N2FrwLTdGR216XEHpD58h_g/exec";
const SEVERE = 0.65;
const MODERATE = 0.85;

function mosteller(h,w) {
  return Math.sqrt((h*w)/3600);
}

function classify(i) {
  if(!i) return {label:"N/A", cls:""};
  if(i <= SEVERE) return {label:"Severe", cls:"sev"};
  if(i <= MODERATE) return {label:"Moderate", cls:"mod"};
  return {label:"OK", cls:"ok"};
}

function compute() {
  let w = parseFloat(document.getElementById("weight").value);
  let h = parseFloat(document.getElementById("height").value);
  if(!w || !h) return alert("Invalid values");

  let bsa = mosteller(h,w);
  document.getElementById("bsa").innerText = bsa.toFixed(3);

  let cards = document.getElementById("cards");
  cards.innerHTML = "";

  for(const [name,list] of Object.entries(DATA)) {
    let card = document.createElement("div");
    card.className="card";
    card.innerHTML="<h3>"+name+"</h3>";

    let table = document.createElement("table");
    table.innerHTML=`
      <tr><th>Label</th><th>OD</th><th>EOA</th><th>iEOA</th><th>PPM</th></tr>
    `;

    for(const r of list) {
      let iEOA = r.eoa ? r.eoa/bsa : null;
      let ppm = classify(iEOA);

      let row = document.createElement("tr");
      row.className = ppm.cls;
      row.innerHTML=`
        <td>${r.label ?? "-"}</td>
        <td>${r.outside ?? "-"}</td>
        <td>${r.eoa ?? "N/A"}</td>
        <td>${iEOA ? iEOA.toFixed(2) : "N/A"}</td>
        <td>${ppm.label}</td>
      `;
      table.appendChild(row);
    }

    card.appendChild(table);
    cards.appendChild(card);
  }

  fetch(LOG_ENDPOINT, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"ok",
      timestamp:new Date().toISOString(),
      weight:w,
      height:h,
      bsa:bsa,
      surname:document.getElementById("surname").value,
      workplace:document.getElementById("workplace").value
    })
  });
}

function generatePDF() {
  window.print();
}

compute();
</script>

</body>
</html>
